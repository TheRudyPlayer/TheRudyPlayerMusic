<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TheRudyPlayer Music</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0a0a0a;
color:white;
min-height:100vh;
}

header{
background:#111;
padding:20px;
font-size:28px;
font-weight:bold;
border-bottom:1px solid #222;
}

.page{
padding:20px;
}

.library{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:#171717;
border-radius:18px;
overflow:hidden;
cursor:pointer;
transition:.25s;
}

.card:hover{
transform:translateY(-5px);
background:#222;
}

.card img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
display:block;
}

.card-info{
padding:15px;
}

.card-title{
font-size:18px;
font-weight:bold;
margin-bottom:5px;
}

.card-date{
color:#aaa;
font-size:14px;
}

#songPage{
display:none;
animation:fade .25s;
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

.back{
display:inline-block;
margin-bottom:20px;
cursor:pointer;
font-size:18px;
color:#ff5555;
}

.song-layout{
display:flex;
gap:40px;
align-items:flex-start;
}

.cover-big{
width:350px;
max-width:100%;
border-radius:24px;
box-shadow:0 0 25px rgba(0,0,0,.5);
}

.song-info{
flex:1;
}

.song-title{
font-size:42px;
font-weight:bold;
margin-bottom:10px;
}

.artist{
font-size:22px;
color:#ddd;
margin-bottom:15px;
}

.date{
color:#aaa;
margin-bottom:20px;
}

audio{
width:100%;
}

@media(max-width:800px){

.song-layout{
flex-direction:column;
align-items:center;
text-align:center;
}

.cover-big{
width:90%;
max-width:350px;
}

.song-title{
font-size:32px;
}

.artist{
font-size:18px;
}

}
</style>
</head>
<body>

<header>
🎵 TheRudyPlayer Music
</header>

<!-- BIBLIOTECA -->

<div id="homePage" class="page">

<h2>Biblioteca</h2>

<div class="library">

<!-- CANCIÓN 1 -->
<div class="card" onclick="openSong(
'MR MEOW FUNK V4',
'TheRudyPlayer',
'17 Junio 2026',
'covers/ALBEQNQPhonkV3ChiptuneCover.png',
'songs/AY LO SIENTO BRO ES QUE NO QUIERO PHONK (Chiptune Version) @ELGENERALFRANCOPRO229 (50k)_1769524236776.oga'
)">
<img src="covers/ALBEQNQPhonkV3ChiptuneCover.png">
<div class="card-info">
<div class="card-title">MR MEOW FUNK V4</div>
<div class="card-date">17 Junio 2026</div>
</div>
</div>

<!-- COPIA ESTE BLOQUE PARA MÁS CANCIONES -->

<!--
<div class="card" onclick="openSong(
'Titulo',
'TheRudyPlayer',
'20 Junio 2026',
'cover2.jpg',
'song2.mp3'
)">
<img src="cover2.jpg">
<div class="card-info">
<div class="card-title">Titulo</div>
<div class="card-date">20 Junio 2026</div>
</div>
</div>
-->

</div>

</div>

<!-- PÁGINA DE CANCIÓN -->

<div id="songPage" class="page">

<div class="back" onclick="goBack()">
← Volver a Biblioteca
</div>

<div class="song-layout">

<img
id="coverBig"
class="cover-big"
src="covers/ALBEQNQPhonkV3ChiptuneCover.png">

<div class="song-info">

<div
id="songTitle"
class="song-title">
AY LO SIENTO BRO ES QUE NO QUIERO PHONK V3 (Chiptune Remix)
</div>

<div
id="artist"
class="artist">
TheRudyPlayer
</div>

<div
id="date"
class="date">
📅 Creado el 17 Junio 2026
</div>

<audio
id="audioPlayer"
controls>
</audio>

</div>

</div>

</div>

<script>

function openSong(title, artist, date, cover, audio){

document.getElementById("homePage").style.display = "none";
document.getElementById("songPage").style.display = "block";

document.getElementById("songTitle").textContent = title;
document.getElementById("artist").textContent = artist;
document.getElementById("date").textContent =
"📅 Creado el " + date;

document.getElementById("coverBig").src = cover;

const player = document.getElementById("audioPlayer");

player.pause();
player.src = audio;
player.load();

}

function goBack(){

document.getElementById("songPage").style.display = "none";
document.getElementById("homePage").style.display = "block";

}

</script>

</body>
</html>
